name: Build Rules

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: build-rules-${{ github.ref }}
  cancel-in-progress: true

env:
  MIHOMO_VERSION: v1.19.27
  SING_BOX_VERSION: v1.13.13

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Checkout SKK ruleset
        uses: actions/checkout@v7
        with:
          repository: SukkaLab/ruleset.skk.moe
          path: .upstream/skk
          sparse-checkout: |
            List
          persist-credentials: false

      - name: Checkout v2fly domain list
        uses: actions/checkout@v7
        with:
          repository: v2fly/domain-list-community
          path: .upstream/v2fly
          sparse-checkout: |
            data
          persist-credentials: false

      - name: Checkout profile tools
        uses: actions/checkout@v7
        with:
          repository: AlexKris/profile
          path: .upstream/profile
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            tool/setup.sh
            tool/check_setup.sh
            tool/check/check_ssh_config.sh
            tool/check/check_firewall.sh
            tool/proxy/soga.sh
            tool/proxy/heki.sh
            tool/proxy/snell.sh
            tool/proxy/ssrust.sh
            tool/ddns/ddns.sh
            tool/ddns/nf_check.sh
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install rule compilers
        shell: bash
        run: |
          set -euo pipefail

          curl -fL --retry 3 \
            -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz"
          gunzip -c /tmp/mihomo.gz > /tmp/mihomo
          sudo install -m 0755 /tmp/mihomo /usr/local/bin/mihomo

          sing_box_asset="sing-box-${SING_BOX_VERSION#v}-linux-amd64.tar.gz"
          curl -fL --retry 3 \
            -o /tmp/sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/${SING_BOX_VERSION}/${sing_box_asset}"
          mkdir -p /tmp/sing-box
          tar -xzf /tmp/sing-box.tar.gz -C /tmp/sing-box
          sudo install -m 0755 "$(find /tmp/sing-box -type f -name sing-box | head -n 1)" /usr/local/bin/sing-box

          mihomo -v
          sing-box version

      - name: Static checks
        run: |
          python3 -m json.tool config/rules.json >/tmp/rules_config.json
          python3 -m py_compile scripts/build_rules.py
          python3 -m py_compile scripts/build_mitm.py
          python3 -m py_compile scripts/build_site.py

      - name: Validate profile tool scripts
        shell: bash
        run: |
          set -euo pipefail
          profile_tools=(
            tool/setup.sh
            tool/check_setup.sh
            tool/check/check_ssh_config.sh
            tool/check/check_firewall.sh
            tool/proxy/soga.sh
            tool/proxy/heki.sh
            tool/proxy/snell.sh
            tool/proxy/ssrust.sh
            tool/ddns/ddns.sh
            tool/ddns/nf_check.sh
          )
          for file in "${profile_tools[@]}"; do
            bash -n ".upstream/profile/$file"
          done

      - name: Build generated rules
        env:
          RULES_REQUIRE_LOCAL_SOURCES: "1"
        run: |
          python3 scripts/build_rules.py
          python3 scripts/build_mitm.py

      - name: Validate sing-box rule sets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          for file in sing-box/**/*.srs; do
            sing-box rule-set decompile "$file" -o /tmp/sing-box-rule-set.json
          done

      - name: Validate Mihomo rule sets
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          lines = ["rule-providers:"]
          providers = []
          for directory, behavior in [
              ("mihomo/domainset", "domain"),
              ("mihomo/non-ip", "domain"),
              ("mihomo/ip", "ipcidr"),
          ]:
              for path in sorted(Path(directory).glob("*.mrs")):
                  name = path.with_suffix("").as_posix().replace("/", "-")
                  providers.append(name)
                  lines.extend([
                      f"  {name}:",
                      "    type: file",
                      f"    behavior: {behavior}",
                      "    format: mrs",
                      f"    path: ./{path.as_posix()}",
                  ])
          for path in sorted(Path("mihomo/classical").glob("*.list")):
              name = path.with_suffix("").as_posix().replace("/", "-")
              providers.append(name)
              lines.extend([
                  f"  {name}:",
                  "    type: file",
                  "    behavior: classical",
                  "    format: text",
                  f"    path: ./{path.as_posix()}",
              ])
          lines.append("rules:")
          lines.extend(f"  - RULE-SET,{name},DIRECT" for name in providers)
          lines.append("  - MATCH,DIRECT")
          Path("/tmp/mihomo-mrs-check.yaml").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          mihomo -d "$PWD" -t -f /tmp/mihomo-mrs-check.yaml

      - name: Check diff
        run: git diff --check

      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update generated rules"
          git push

      - name: Build Pages site
        run: python3 scripts/build_site.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
